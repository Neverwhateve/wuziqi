# Nginx 配置 - 支持 HTTPS 和 WSS
# 将此文件复制到 /etc/nginx/sites-available/wuziqi
# 然后创建软链接到 /etc/nginx/sites-enabled/wuziqi

# HTTP 80端口 - 重定向到 HTTPS
server {
    listen 80;
    server_name wzq.wuxiela.fun;
    return 301 https://$server_name$request_uri;
}

# HTTPS 443端口 - 主配置
server {
    listen 443 ssl http2;
    server_name wzq.wuxiela.fun;

    # SSL 证书配置 - 修改为你的证书路径
    ssl_certificate /etc/nginx/ssl/wuziqi.pem;
    ssl_certificate_key /etc/nginx/ssl/wuziqi.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 前端静态文件和WebSocket代理
    location / {
        # 检查是否是 WebSocket 升级请求
        if ($http_upgrade = "websocket") {
            proxy_pass http://localhost:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket 超时设置，防止连接被切断
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            break;
        }

        # 普通 HTTP 请求 - 前端静态文件
        root /root/wuziqi/server/public;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}
