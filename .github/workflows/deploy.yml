name: Deploy to Aliyun

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /root/wuziqi
            git pull
            npm run build
            cp -r /root/wuziqi/server/public/* /var/www/wuziqi/
            pm2 restart wuziqi
            echo "✅ Deploy completed successfully!"
